# ============================================================
# Observability stack for Agentic RAG for Dummies
# PyConf Hyderabad 2026 — live demo
#
# Services:
#   Phoenix     → http://localhost:6006   (Arize Phoenix UI + OTLP)
#   Langfuse    → http://localhost:3000   (Langfuse UI)
#   Langfuse OTLP endpoint: http://localhost:3000/api/public/otel/v1/traces
#
# Backing services (internal only):
#   PostgreSQL  → localhost:5432
#   ClickHouse  → localhost:8123
#   Redis       → localhost:6379
#   MinIO       → localhost:9000  (S3-compatible blob store)
#   MinIO UI    → localhost:9001
#
# First time setup:
#   docker compose up -d
#   Wait ~60 seconds for all health checks to pass.
#   Open http://localhost:3000, create an account, create a project,
#   copy the Public/Secret keys into .env.
# ============================================================

services:

  # ----------------------------------------------------------
  # PHOENIX — Arize observability (already running)
  # ----------------------------------------------------------
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    restart: unless-stopped

  # ----------------------------------------------------------
  # POSTGRESQL — Langfuse core app data
  # ----------------------------------------------------------
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # CLICKHOUSE — Langfuse trace/observation storage
  # ----------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
      # Keeper (built-in ZooKeeper) + single-node cluster config.
      # Langfuse uses ON CLUSTER default + ReplicatedMergeTree — both require these.
      - ./clickhouse/config.d/keeper.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
      - ./clickhouse/config.d/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ----------------------------------------------------------
  # REDIS — Langfuse queue + cache
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass langfuse
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "langfuse", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----------------------------------------------------------
  # MINIO — S3-compatible blob store for Langfuse v3 events
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot container that creates the 'langfuse' bucket in MinIO
  minio-createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio miniosecret &&
        mc mb --ignore-existing local/langfuse &&
        echo 'Bucket langfuse ready.'
      "
    restart: "no"

  # ----------------------------------------------------------
  # LANGFUSE WEB — UI + API (port 3000)
  # ----------------------------------------------------------
  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-createbuckets:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      DIRECT_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse

      # Generate your own: openssl rand -hex 32
      NEXTAUTH_SECRET: 2fcce62d95f8d1d2e0984ca097e74ba749ecb3330c1afc3d4599ff4f1d80885c
      ENCRYPTION_KEY: 2fcce62d95f8d1d2e0984ca097e74ba749ecb3330c1afc3d4599ff4f1d80885c
      NEXTAUTH_URL: http://localhost:3000
      SALT: ragwatch-pyconf-hyd-2026

      # ClickHouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse@clickhouse:9000/langfuse
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "true"

      # Redis
      REDIS_CONNECTION_STRING: redis://:langfuse@redis:6379

      # MinIO / S3 blob store
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      # Telemetry (disable phoning home in demo)
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

  # ----------------------------------------------------------
  # LANGFUSE WORKER — background job processor
  # ----------------------------------------------------------
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-createbuckets:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      DIRECT_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse

      ENCRYPTION_KEY: 2fcce62d95f8d1d2e0984ca097e74ba749ecb3330c1afc3d4599ff4f1d80885c
      SALT: ragwatch-pyconf-hyd-2026

      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse@clickhouse:9000/langfuse
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "true"

      REDIS_CONNECTION_STRING: redis://:langfuse@redis:6379

      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      TELEMETRY_ENABLED: "false"


# ----------------------------------------------------------
# VOLUMES
# ----------------------------------------------------------
volumes:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
